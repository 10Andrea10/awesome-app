apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: demo
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: demo-app
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/part-of: demo-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: demo-app
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - "-text=hello from backend"
            - "-listen=:5678"
          ports:
            - containerPort: 5678
              name: http
