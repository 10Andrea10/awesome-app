apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: demo
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: demo-app
    app.kubernetes.io/component: web
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Demo App</title>
        <style>
          body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f7fb;
            color: #1f2937;
          }
          main {
            max-width: 720px;
            margin: 4rem auto;
            padding: 2rem;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
          }
          h1 {
            margin-top: 0;
          }
          button {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border: 0;
            border-radius: 8px;
            background: #2563eb;
            color: #ffffff;
            cursor: pointer;
          }
          pre {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            background: #e5e7eb;
            white-space: pre-wrap;
          }
        </style>
      </head>
      <body>
        <main>
          <h1>Demo App</h1>
          <p>Frontend is running</p>
          <button id="call-backend" type="button">Call Backend</button>
          <pre id="response">Waiting for backend response...</pre>
        </main>
        <script>
          const responseEl = document.getElementById("response");
          const buttonEl = document.getElementById("call-backend");

          async function callBackend() {
            responseEl.textContent = "Loading...";

            try {
              const response = await fetch("/api");
              const text = await response.text();
              responseEl.textContent = text;
            } catch (error) {
              responseEl.textContent = "Request failed";
            }
          }

          buttonEl.addEventListener("click", callBackend);
          callBackend();
        </script>
      </body>
    </html>
