apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: demo
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: demo-app
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: demo-app
  ports:
    - name: http
      port: 80
      targetPort: http
